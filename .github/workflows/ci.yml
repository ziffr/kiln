name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    name: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build web app
        run: npm run build --workspace @vbd/web
