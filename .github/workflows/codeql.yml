name: CodeQL

# Static analysis (SAST) for the Kiln repo itself. Scans on every push and PR to any branch, plus a
# weekly scheduled run so newly-disclosed query packs re-examine the default branch.
on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
