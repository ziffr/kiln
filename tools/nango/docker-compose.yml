# Optional LOCAL Nango — one of three equal ways to point Kiln at a Nango instance (the others being
# Nango Cloud and an existing company Nango). Self-hosting is NEVER required: Kiln and every exported app
# reach whichever Nango you set via NANGO_HOST + NANGO_SECRET_KEY. This stack is convenience, not posture.
#
# Boot it with `./kiln.sh nango:up` (which also generates NANGO_ENCRYPTION_KEY and prints next steps), or
# by hand: `docker compose -f tools/nango/docker-compose.yml up -d`. Tear down with `./kiln.sh nango:down`.
#
# Adapted from Nango's official self-host compose (PLAN-013 §5):
#   - nango-db      Postgres 16 — Nango's own metadata + encrypted connection store
#   - nango-server  nangohq/nango-server:hosted — API on :3003, Connect UI on :3009
#   - nango-redis   Redis — orchestrator/queue backing
#   - elasticsearch OPTIONAL logs backend (profile `logs`; off by default to stay light)
#
# NANGO_ENCRYPTION_KEY is REQUIRED (a base64 32-byte key; `openssl rand -base64 32`). Everything here is a
# local dev instance — the default dashboard credentials below are for localhost only; change them for any
# non-local use.
services:
  nango-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nango
      POSTGRES_PASSWORD: nango
      POSTGRES_DB: nango
    volumes: ["nangodb:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nango"]
      interval: 5s
      timeout: 5s
      retries: 10

  nango-redis:
    image: redis:7-alpine
    volumes: ["nangoredis:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  nango-server:
    image: nangohq/nango-server:hosted
    depends_on:
      nango-db:
        condition: service_healthy
      nango-redis:
        condition: service_healthy
    environment:
      # ── required secret (generated by `./kiln.sh nango:up` if absent) ──────────────────────────────
      NANGO_ENCRYPTION_KEY: ${NANGO_ENCRYPTION_KEY:?set NANGO_ENCRYPTION_KEY (base64 32 bytes) — run ./kiln.sh nango:up or `openssl rand -base64 32`}
      # ── how the server addresses itself + the Connect UI ──────────────────────────────────────────
      NANGO_SERVER_URL: http://localhost:3003
      NANGO_PUBLIC_SERVER_URL: http://localhost:3003
      NANGO_PUBLIC_CONNECT_URL: http://localhost:3009
      NANGO_DASHBOARD_USERNAME: ${NANGO_DASHBOARD_USERNAME:-admin}
      NANGO_DASHBOARD_PASSWORD: ${NANGO_DASHBOARD_PASSWORD:-admin}
      # ── datastores ────────────────────────────────────────────────────────────────────────────────
      NANGO_DB_HOST: nango-db
      NANGO_DB_PORT: "5432"
      NANGO_DB_USER: nango
      NANGO_DB_PASSWORD: nango
      NANGO_DB_NAME: nango
      NANGO_REDIS_URL: redis://nango-redis:6379
      # logs OFF by default (no elasticsearch) — flip on with the `logs` profile below.
      NANGO_LOGS_ENABLED: "${NANGO_LOGS_ENABLED:-false}"
      FLAG_SERVE_CONNECT_UI: "true"
    ports:
      - "3003:3003" # REST API — this is your NANGO_HOST
      - "3009:3009" # Connect UI (the hosted OAuth flow)

  # OPTIONAL logs backend — enabled only with `--profile logs`; kept off so the default stack stays small.
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    profiles: ["logs"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes: ["nangoes:/usr/share/elasticsearch/data"]

volumes: { nangodb: {}, nangoredis: {}, nangoes: {} }
