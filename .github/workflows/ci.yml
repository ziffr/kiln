name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    name: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        # Node 24: runs the packages' TypeScript sources directly (native type-stripping, no build
        # step). Node 20 cannot — `node --test *.ts` fails with ERR_UNKNOWN_FILE_EXTENSION.
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build web app
        run: npm run build --workspace @kiln/web
