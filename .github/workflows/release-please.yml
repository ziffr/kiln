name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    # release-please needs "Allow GitHub Actions to create and approve pull requests" (a repo setting)
    # to open its release PR; until the repo is public and that's enabled, it fails. Gate on visibility
    # so it doesn't run (and email) while private; it resumes automatically once the repo is public.
    if: ${{ github.event.repository.visibility == 'public' }}
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
