name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    # release-please needs "Allow GitHub Actions to create and approve pull requests" (a repo setting)
    # to open its release PR; until the repo is public and that's enabled, it fails. Gate on visibility
    # so it doesn't run (and email) while private; it resumes automatically once the repo is public.
    if: ${{ github.event.repository.visibility == 'public' }}
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      version: ${{ steps.rp.outputs.version }}
      major: ${{ steps.rp.outputs.major }}
      minor: ${{ steps.rp.outputs.minor }}
      patch: ${{ steps.rp.outputs.patch }}
    steps:
      - name: Run release-please
        id: rp
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # When a release is cut, freeze the live ("Next") docs into a version matching the studio release, so the
  # default docs version ALWAYS equals the app version — they move in lockstep. Fires on EVERY release
  # (minor/major AND patch). The snapshot commits as `chore(docs):` — a NON-releasing type (release-please
  # 17.x DOES bump a patch for `docs:`, which would loop: snapshot → patch → snapshot → …). So `chore(docs):`
  # is both the loop-breaker here and the convention for any docs-only edit you want kept out of the release
  # cycle. The snapshot lands as a REVIEWED PR (docs-site is code-owned).
  docs-version:
    name: snapshot docs for the release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: Cut the docs version and open a PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          set -euo pipefail
          # VERSION is release-please output (a semver string), not user text — safe to use in commands.
          cd docs-site
          npm ci
          npm run docusaurus docs:version "$VERSION"
          # Keep exactly ONE version — the one just cut. The site shows only the doc version matching the
          # published app; no history, no dropdown. docs:version APPENDS to versions.json, so overwrite it
          # and delete every other versioned_docs / sidebar.
          printf '[\n  "%s"\n]\n' "$VERSION" > versions.json
          find versioned_docs -mindepth 1 -maxdepth 1 -type d ! -name "version-$VERSION" -exec rm -rf {} +
          find versioned_sidebars -type f -name '*-sidebars.json' ! -name "version-$VERSION-sidebars.json" -delete
          cd ..
          # Bump lastVersion to the just-released version so it's served at the docs ROOT (the default),
          # keeping docs in lockstep with studio releases.
          sed -i -E "s/(lastVersion: )\"[0-9]+\.[0-9]+\.[0-9]+\"/\1\"$VERSION\"/" docs-site/docusaurus.config.js
          if git diff --quiet; then
            echo "No docs changes to snapshot (already versioned?)."; exit 0
          fi
          branch="docs/snapshot-v$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          # -A so the deletions of the old versioned dirs/sidebars are staged, not just additions.
          git add -A docs-site/versioned_docs docs-site/versioned_sidebars docs-site/versions.json docs-site/docusaurus.config.js
          git commit -m "chore(docs): snapshot v$VERSION + make it the default"
          git push origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "chore(docs): snapshot v$VERSION" \
            --body "Automated docs version snapshot matching studio release v$VERSION. The live \`docs/\` folder continues as \"Next\"; review and merge to publish the versioned docs."
